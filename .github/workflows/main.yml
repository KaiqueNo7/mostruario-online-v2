name: mostruario.online deployment

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kirschbaumdevelopment/laravel-test-runner:8.2
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: u681759714_mostruario
          MYSQL_USER: u681759714_mostruario
          MYSQL_PASSWORD: KKai125689.
          MYSQL_ROOT_PASSWORD: Kai125689.
        ports:
          - 3306:3306
        options: --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Prepare Laravel App
        run: cp .env.ci .env

      - name: Composer Install
        run: |
          composer install --no-progress --prefer-dist --optimize-autoloader
          php artisan key:generate

      - name: Migrations
        run: php artisan migrate

      - name: Install NPM Packages
        run: |
          npm install
          npm run production

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  deploy-production:
    needs: build
    runs-on: ubuntu-latest 
    container:
      image: lorisleiva/laravel-docker:latest
    environment:
      name: production
      url: ${{ vars.URL }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v2

      - name: Inicializar SSH
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' | ssh-add - > /dev/null
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          [[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config

      - name: Alterar permissões de arquivos
        run: |
          find . -type f -not -path "./vendor/*" -exec chmod 664 {} \;
          find . -type d -not -path "./vendor/*" -exec chmod 775 {} \;

      - name: Hostinger Deployment
        uses: easingthemes/ssh-deploy@main
      
        with: 
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-rlgoDzvc"
          SOURCE: "/"
          REMOTE_HOST: ${{ vars.REMOTE_HOST }}
          REMOTE_USER: ${{ vars.REMOTE_USER }}
          REMOTE_PORT: ${{ vars.REMOTE_PORT }}
          TARGET: ${{ vars.TARGET }}
